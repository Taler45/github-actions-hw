name: Task3

on:
  pull_request:
    branches: [ "develop" ]

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run tests and check coverage
        run: python -m pytest --cov=myapp --cov-fail-under=70 > coverage-report.txt
        
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-report
          path: coverage-report.txt

  build:
    needs: test-and-coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Add Badge to README
        run: |
          BADGE="[![Task3](https://github.com/${{ github.repository }}/actions/workflows/workflow.yml/badge.svg)](https://github.com/${{ github.repository }}/actions/workflows/workflow.yml)"
          
          if ! grep -q "$BADGE" README.md; then
            echo "Бейдж не знайдено. Додаємо..."
            echo -e "$BADGE\n\n$(cat README.md)" > README.md
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "docs: add build status badge to README"
            git push
          else
            echo "Бейдж вже існує. Пропускаємо оновлення."
          fi